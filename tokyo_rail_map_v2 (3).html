<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東京都 路線マップ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');
  :root {
    --bg:#f5f5f7;--panel:#ffffff;--border:#dde0e8;
    --text:#1a1a2e;--muted:#888ea8;--accent:#2563eb;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  header{padding:9px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;background:var(--panel);flex-shrink:0}
  header h1{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.15em;color:var(--accent);text-transform:uppercase}
  header span{font-size:11px;color:var(--muted)}
  .main{display:flex;flex:1;overflow:hidden}
  .sidebar{width:210px;background:var(--panel);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0;display:flex;flex-direction:column}
  .sidebar-header{padding:10px 13px 7px;font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;font-family:'Space Mono',monospace;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--panel);z-index:10}
  .btn-all{font-size:9px;padding:2px 7px;border:1px solid var(--border);border-radius:3px;background:transparent;color:var(--muted);cursor:pointer;font-family:'Space Mono',monospace;transition:all .15s}
  .btn-all:hover{border-color:var(--accent);color:var(--accent)}
  .operator-group{border-bottom:1px solid var(--border)}
  .operator-label{padding:7px 13px 3px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-family:'Space Mono',monospace}
  .line-item{display:flex;align-items:center;gap:8px;padding:4px 13px;cursor:pointer;transition:background .1s;user-select:none}
  .line-item:hover{background:rgba(0,0,0,.04)}
  .line-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:2px solid;transition:opacity .2s}
  .line-name{font-size:11px;color:var(--text);transition:opacity .2s;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .line-item.off .line-dot,.line-item.off .line-name{opacity:.28}
  .map-area{flex:1;position:relative;overflow:hidden;background:#e8edf5}
  #map-svg{width:100%;height:100%;cursor:grab}
  #map-svg:active{cursor:grabbing}
  .district{fill:#f0f3fa;stroke:#b8c0d8;stroke-width:.5;transition:fill .12s}
  .district:hover{fill:#e2e8f5}
  .district-label{font-family:'Noto Sans JP',sans-serif;font-size:5.5px;fill:#7a84a8;text-anchor:middle;pointer-events:none;dominant-baseline:middle}
  .rail-line{fill:none;stroke-linecap:round;stroke-linejoin:round;transition:opacity .2s}
  .rail-line.hidden,.station-dot.hidden{opacity:0!important;pointer-events:none}
  .station-dot{transition:opacity .2s;cursor:pointer}
  #tooltip{position:absolute;background:rgba(255,255,255,.97);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:100;backdrop-filter:blur(8px);box-shadow:0 2px 12px rgba(0,0,0,.1)}
  #tooltip.visible{opacity:1}
  #tt-name{font-weight:500;font-size:12px}
  #tt-line{font-size:10px;color:var(--muted);margin-top:2px}
  .controls{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:4px;z-index:10}
  .ctrl-btn{width:30px;height:30px;background:var(--panel);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s}
  .ctrl-btn:hover{border-color:var(--accent)}
  ::-webkit-scrollbar{width:3px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<header>
  <h1>Tokyo Rail Map</h1>
  <span>東京都 鉄道路線図（実形状）</span>
  <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
    <label style="font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;letter-spacing:.08em">線の太さ</label>
    <input type="range" id="thickness" min="0.2" max="2" step="0.1" value="1"
      style="width:90px;accent-color:var(--accent);cursor:pointer">
    <span id="thickness-val" style="font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;width:24px">×1</span>
  </div>
</header>
<div class="main">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      路線選択
      <div style="display:flex;gap:4px">
        <button class="btn-all" onclick="setAll(true)">全ON</button>
        <button class="btn-all" onclick="setAll(false)">全OFF</button>
      </div>
    </div>
  </div>
  <div class="map-area">
    <svg id="map-svg" viewBox="0 0 900 750" xmlns="http://www.w3.org/2000/svg">
      <g id="districts-layer"></g>
      <g id="labels-layer"></g>
      <g id="lines-layer"></g>
      <g id="stations-layer"></g>
      <g id="landmarks-layer"></g>
    </svg>
    <div id="tooltip"><div id="tt-name"></div><div id="tt-line"></div></div>
    <div class="controls">
      <button class="ctrl-btn" onclick="zoom(1.3)" title="拡大">＋</button>
      <button class="ctrl-btn" onclick="zoom(0.77)" title="縮小">－</button>
      <button class="ctrl-btn" onclick="resetView()" title="全体表示" style="font-size:11px">⌂</button>
    </div>
  </div>
</div>

// Affine transform: lon/lat → SVG coords
const Mx=[899.174598,-68.3998006,-122497.834];
const My=[10.2043005,-1103.99817,38357.2549];
function ll2svg(lon,lat){
  return [Mx[0]*lon+Mx[1]*lat+Mx[2], My[0]*lon+My[1]*lat+My[2]];
}

// ── DRAW DISTRICTS ───────────────────────────────────────────
const distLayer = document.getElementById('districts-layer');
const lblLayer  = document.getElementById('labels-layer');

DISTRICTS.features.forEach(f => {
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', f.d);
  path.setAttribute('class','district');
  distLayer.appendChild(path);
});

// Small area districts that are too small to label
const noLabel = new Set(['13101','13102','13105','13106','13107','13114','13116','13118','13203','13204','13210','13213','13214','13215','13218','13219','13220','13221','13222','13223','13224','13225','13227']);

DISTRICTS.centroids.forEach(c => {
  if(noLabel.has(c.code)) return;
  const feat = DISTRICTS.features.find(f=>f.code===c.code);
  if(!feat) return;
  const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
  txt.setAttribute('x', c.cx);
  txt.setAttribute('y', c.cy);
  txt.setAttribute('class','district-label');
  txt.textContent = feat.name.replace('市','').replace('区','').replace('町','').replace('村','');
  lblLayer.appendChild(txt);
});

// ── DRAW RAIL LINES ──────────────────────────────────────────
const lineLayer = document.getElementById('lines-layer');
const stLayer   = document.getElementById('stations-layer');
const lineState = {};
const lineEls   = {};

OPERATORS.forEach(op => {
  op.lines.forEach(line => {
    lineState[line.id] = true;
    const pts = line.stations.map(s => ll2svg(s.lon, s.lat));
    
    let d = pts.map((p,i)=>(i===0?`M${p[0].toFixed(1)},${p[1].toFixed(1)}`:`L${p[0].toFixed(1)},${p[1].toFixed(1)}`)).join('');
    if(line.loop) d += 'Z';
    
    const pe = document.createElementNS('http://www.w3.org/2000/svg','path');
    pe.setAttribute('d',d);
    pe.setAttribute('class','rail-line');
    pe.setAttribute('stroke',line.color);
    pe.setAttribute('stroke-width',line.width);
    pe.setAttribute('opacity','0.85');
    lineLayer.appendChild(pe);
    
    const dots = [];
    line.stations.forEach(s => {
      const [sx,sy] = ll2svg(s.lon,s.lat);
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx',sx.toFixed(1));
      dot.setAttribute('cy',sy.toFixed(1));
      dot.setAttribute('r','2.2');
      dot.setAttribute('fill',line.color);
      dot.setAttribute('class','station-dot');
      dot.dataset.name=s.n; dot.dataset.line=line.name; dot.dataset.color=line.color;
      dot.addEventListener('mouseenter',showTip);
      dot.addEventListener('mouseleave',hideTip);
      stLayer.appendChild(dot);
      dots.push(dot);
    });
    
    lineEls[line.id]={path:pe, dots};
  });
});

// ── TOOLTIP ──────────────────────────────────────────────────
const tooltip=document.getElementById('tooltip');
const ttName=document.getElementById('tt-name');
const ttLine=document.getElementById('tt-line');

function showTip(e){
  ttName.textContent=e.target.dataset.name;
  ttLine.innerHTML=`<span style="color:${e.target.dataset.color}">●</span> ${e.target.dataset.line}`;
  tooltip.classList.add('visible');
  moveTip(e);
}
function hideTip(){tooltip.classList.remove('visible')}
function moveTip(e){
  const r=document.querySelector('.map-area').getBoundingClientRect();
  let tx=e.clientX-r.left+12, ty=e.clientY-r.top-34;
  if(tx+185>r.width) tx-=195;
  if(ty<0) ty=5;
  tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px';
}
document.querySelector('.map-area').addEventListener('mousemove',e=>{
  if(tooltip.classList.contains('visible')) moveTip(e);
});

    circle.setAttribute('stroke', '#1a1a2e');
    circle.setAttribute('stroke-width', '1.8');
    lmLayer.appendChild(circle);

    // ラベル
    const labelW = name.length * 8 + 6;
    const lx = cx + dx, ly = cy + dy;

    const bg = document.createElementNS(ns, 'rect');
    bg.setAttribute('x', dx >= 0 ? lx - 2 : lx - labelW + 2);
    bg.setAttribute('y', ly - 9);
    bg.setAttribute('width', labelW);
    bg.setAttribute('height', 12);
    bg.setAttribute('rx', '3');
    bg.setAttribute('fill', '#fff');
    bg.setAttribute('stroke', '#b8c0d8');
    bg.setAttribute('stroke-width', '0.7');
    lmLayer.appendChild(bg);

    const lbl = document.createElementNS(ns, 'text');
    lbl.setAttribute('x', dx >= 0 ? lx + 1 : lx - labelW + 5);
    lbl.setAttribute('y', ly - 1);
    lbl.setAttribute('font-family', 'Noto Sans JP, sans-serif');
    lbl.setAttribute('font-size', '8');
    lbl.setAttribute('font-weight', '700');
    lbl.setAttribute('fill', '#1a1a2e');
    lbl.textContent = name;
    lmLayer.appendChild(lbl);
  });
})();
const sidebar=document.getElementById('sidebar');
OPERATORS.forEach(op=>{
  const grp=document.createElement('div'); grp.className='operator-group';
  const lbl=document.createElement('div'); lbl.className='operator-label'; lbl.textContent=op.name;
  grp.appendChild(lbl);
  op.lines.forEach(line=>{
    const item=document.createElement('div'); item.className='line-item'; item.dataset.lid=line.id;
    const dot=document.createElement('div'); dot.className='line-dot';
    dot.style.borderColor=line.color; dot.style.backgroundColor=line.color+'33';
    const nm=document.createElement('div'); nm.className='line-name'; nm.textContent=line.name;
    item.appendChild(dot); item.appendChild(nm);
    item.addEventListener('click',()=>toggle(line.id,item));
    grp.appendChild(item);
  });
  sidebar.appendChild(grp);
});

function toggle(id,el){
  lineState[id]=!lineState[id];
  el.classList.toggle('off',!lineState[id]);
  updateVis(id);
}
function updateVis(id){
  const e=lineEls[id]; if(!e) return;
  e.path.classList.toggle('hidden',!lineState[id]);
  e.dots.forEach(d=>d.classList.toggle('hidden',!lineState[id]));
}
function setAll(on){
  Object.keys(lineState).forEach(id=>{lineState[id]=on;updateVis(id);});
  document.querySelectorAll('.line-item').forEach(i=>i.classList.toggle('off',!on));
}

// ── PAN / ZOOM ───────────────────────────────────────────────
let vx=0,vy=0,vs=1,drag=false,dx0,dy0,vx0,vy0;
const svg=document.getElementById('map-svg');
function applyT(){svg.setAttribute('viewBox',`${vx} ${vy} ${900/vs} ${750/vs}`)}
svg.addEventListener('mousedown',e=>{if(e.button!==0)return;drag=true;dx0=e.clientX;dy0=e.clientY;vx0=vx;vy0=vy;});
window.addEventListener('mousemove',e=>{if(!drag)return;vx=vx0-(e.clientX-dx0)/vs;vy=vy0-(e.clientY-dy0)/vs;applyT();});
window.addEventListener('mouseup',()=>drag=false);
svg.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.15:0.87;
  const r=svg.getBoundingClientRect();
  const mx=(e.clientX-r.left)/r.width*(900/vs)+vx;
  const my=(e.clientY-r.top)/r.height*(750/vs)+vy;
  vs=Math.max(.4,Math.min(12,vs*f));
  vx=mx-(e.clientX-r.left)/r.width*(900/vs);
  vy=my-(e.clientY-r.top)/r.height*(750/vs);
  applyT();
},{passive:false});
// touch
let ltd=null;
svg.addEventListener('touchstart',e=>{
  if(e.touches.length===1){drag=true;dx0=e.touches[0].clientX;dy0=e.touches[0].clientY;vx0=vx;vy0=vy;}
  else if(e.touches.length===2){ltd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
},{passive:true});
svg.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&drag){vx=vx0-(e.touches[0].clientX-dx0)/vs;vy=vy0-(e.touches[0].clientY-dy0)/vs;applyT();}
  else if(e.touches.length===2&&ltd){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);vs=Math.max(.4,Math.min(12,vs*d/ltd));ltd=d;applyT();}
},{passive:true});
svg.addEventListener('touchend',()=>{drag=false;ltd=null;});

function zoom(f){vs=Math.max(.4,Math.min(12,vs*f));applyT()}
function resetView(){vx=0;vy=0;vs=1;applyT()}

// ── LINE THICKNESS SLIDER ─────────────────────────────────────
const slider=document.getElementById('thickness');
const thickVal=document.getElementById('thickness-val');
slider.addEventListener('input',()=>{
  const scale=parseFloat(slider.value);
  thickVal.textContent='×'+scale.toFixed(1);
  OPERATORS.forEach(op=>op.lines.forEach(line=>{
    const el=lineEls[line.id];
    if(el) el.path.setAttribute('stroke-width', (line.width*scale).toFixed(2));
  }));
});
</script>
